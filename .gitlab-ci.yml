stages:
  - lint
  - test

default:
  image: python:3.12-slim
  cache:
    key:
      files:
        - pyproject.toml
    paths:
      - .pip-cache/
  before_script:
    - python -V
    - python -m pip install --upgrade pip --cache-dir .pip-cache
    - pip install --cache-dir .pip-cache -e ".[dev]"

# Cheap structural sanity check that runs on every push.
yaml-fixtures:
  stage: lint
  script:
    - python -c "import yaml, glob, sys; [yaml.safe_load(open(p)) for p in glob.glob('configs/**/*.yaml', recursive=True)]; print('configs OK')"
    - python -c "import json, glob; [json.load(open(p)) for p in glob.glob('data/**/*.json', recursive=True)]; print('fixtures OK')"
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pytest:
  stage: test
  script:
    - PYTHONPATH=src pytest -q tests/
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  artifacts:
    when: always
    reports:
      junit: junit.xml
    expire_in: 1 week
