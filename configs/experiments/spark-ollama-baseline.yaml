experiment:
  name: spark-ollama-v1-baseline
  description: Baseline pass for Spark-only model comparison via local Ollama HTTP backend
  platforms:
    - spark
  backend: ollama
  backend_version: local
  models:
    - qwen-3.6
    - gemma-4
    - nemotron-3
  suites:
    - mmlu_pro
    - throughput
    - ttft
    - hallucination_grounding
    - practical_structured_output
  sampling:
    temperature: 0.0
    top_p: 1.0
    seed: 42
    max_tokens: 512
  context_lengths:
    - 512
    - 4096
    - 16384
    - 65536
  repetitions: 1
  warmup_runs: 0
