name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  yaml-fixtures:
    name: yaml / json fixture lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: lint configs (YAML)
        run: |
          python -c "import yaml, glob, sys; [yaml.safe_load(open(p)) for p in glob.glob('configs/**/*.yaml', recursive=True)]; print('configs OK')"
      - name: lint fixtures (JSON)
        run: |
          python -c "import json, glob; [json.load(open(p)) for p in glob.glob('data/**/*.json', recursive=True)]; print('fixtures OK')"

  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: install
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        run: PYTHONPATH=src pytest -q tests/
